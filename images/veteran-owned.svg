<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <!-- American Flag -->
  <g transform="translate(0, 8)">
    <!-- Red and white stripes -->
    <rect x="0" y="0" width="96" height="64" fill="#BF0A30" rx="3"/>
    <rect x="0" y="5" width="96" height="5" fill="#fff"/>
    <rect x="0" y="15" width="96" height="5" fill="#fff"/>
    <rect x="0" y="25" width="96" height="5" fill="#fff"/>
    <rect x="0" y="35" width="96" height="5" fill="#fff"/>
    <rect x="0" y="45" width="96" height="5" fill="#fff"/>
    <rect x="0" y="55" width="96" height="5" fill="#fff"/>
    <!-- Blue canton -->
    <rect x="0" y="0" width="40" height="34" fill="#002868" rx="3"/>
    <!-- Stars (5 rows) -->
    <g fill="#fff">
      <circle cx="7" cy="5" r="1.6"/>
      <circle cx="15" cy="5" r="1.6"/>
      <circle cx="23" cy="5" r="1.6"/>
      <circle cx="31" cy="5" r="1.6"/>
      <circle cx="39" cy="5" r="1.6"/>
      <circle cx="11" cy="10" r="1.6"/>
      <circle cx="19" cy="10" r="1.6"/>
      <circle cx="27" cy="10" r="1.6"/>
      <circle cx="35" cy="10" r="1.6"/>
      <circle cx="7" cy="15" r="1.6"/>
      <circle cx="15" cy="15" r="1.6"/>
      <circle cx="23" cy="15" r="1.6"/>
      <circle cx="31" cy="15" r="1.6"/>
      <circle cx="39" cy="15" r="1.6"/>
      <circle cx="11" cy="20" r="1.6"/>
      <circle cx="19" cy="20" r="1.6"/>
      <circle cx="27" cy="20" r="1.6"/>
      <circle cx="35" cy="20" r="1.6"/>
      <circle cx="7" cy="25" r="1.6"/>
      <circle cx="15" cy="25" r="1.6"/>
      <circle cx="23" cy="25" r="1.6"/>
      <circle cx="31" cy="25" r="1.6"/>
      <circle cx="39" cy="25" r="1.6"/>
      <circle cx="11" cy="30" r="1.6"/>
      <circle cx="19" cy="30" r="1.6"/>
      <circle cx="27" cy="30" r="1.6"/>
      <circle cx="35" cy="30" r="1.6"/>
    </g>
    <!-- Flag border -->
    <rect x="0" y="0" width="96" height="64" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" rx="3"/>
  </g>
  <!-- VETERAN OWNED text -->
  <text font-family="Arial Black, Impact, Helvetica, sans-serif" font-weight="900" fill="#ffffff" letter-spacing="3">
    <tspan x="112" y="35" font-size="26">VETERAN</tspan>
    <tspan x="112" y="63" font-size="26">OWNED</tspan>
  </text>
</svg>
